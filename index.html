<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f1117">
<title>Task Reminders</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%230f1117' width='100' height='100' rx='20'/><text x='50' y='65' text-anchor='middle' font-size='55'>⚡</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace;
    background: linear-gradient(180deg, #0f1117 0%, #1a1d2e 100%);
    color: #e2e8f0;
    min-height: 100vh;
    min-height: 100dvh;
    -webkit-tap-highlight-color: transparent;
    overscroll-behavior: none;
  }

  .header {
    padding: 24px 20px 16px;
    padding-top: max(24px, env(safe-area-inset-top, 24px));
    background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
    border-bottom: 1px solid rgba(255,255,255,0.05);
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .header-top { display: flex; align-items: center; gap: 14px; }
  .header-icon { font-size: 28px; }
  .title { font-size: 20px; font-weight: 700; letter-spacing: -0.5px; color: #f8fafc; }
  .date { margin-top: 2px; font-size: 13px; color: #94a3b8; font-weight: 400; }

  .progress-wrap { display: flex; align-items: center; gap: 12px; margin-top: 16px; }
  .progress-bar { flex: 1; height: 6px; border-radius: 3px; background: rgba(255,255,255,0.07); overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 3px; background: linear-gradient(90deg, #22c55e, #4ade80); transition: width 0.4s ease; }
  .progress-text { font-size: 12px; color: #94a3b8; white-space: nowrap; font-weight: 600; }

  .filters {
    display: flex; gap: 6px; padding: 14px 20px;
    overflow-x: auto; -webkit-overflow-scrolling: touch;
    scrollbar-width: none; position: sticky; top: 90px; z-index: 9;
    background: linear-gradient(180deg, #12141e 0%, #12141e 85%, transparent);
  }
  .filters::-webkit-scrollbar { display: none; }

  .filter-btn {
    padding: 6px 14px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.08);
    background: transparent; color: #94a3b8; font-size: 12px; font-weight: 600;
    font-family: inherit; cursor: pointer; white-space: nowrap; transition: all 0.2s;
  }
  .filter-btn.active { background: #3b82f6; color: #fff; border-color: #3b82f6; }

  .task-list { padding: 0 16px 120px; display: flex; flex-direction: column; gap: 10px; }

  .empty { text-align: center; padding: 48px 20px; color: #94a3b8; }
  .empty-icon { font-size: 32px; }
  .empty-text { margin-top: 8px; opacity: 0.7; }

  .card {
    display: flex; gap: 14px; padding: 14px 16px; border-radius: 12px;
    background: #1e2433; border: 1px solid rgba(255,255,255,0.04);
    cursor: pointer; transition: all 0.2s; user-select: none;
    animation: slideIn 0.3s ease both;
  }
  .card.done { opacity: 0.5; background: #1a1f2b; }
  .card.overdue { border-color: rgba(239,68,68,0.4); }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .checkbox {
    width: 24px; height: 24px; border-radius: 7px; border: 2px solid #475569;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 700; color: transparent; transition: all 0.2s;
    flex-shrink: 0; margin-top: 2px;
  }
  .card.done .checkbox { background: #22c55e; border-color: #22c55e; color: #fff; }

  .card-body { flex: 1; min-width: 0; }
  .card-title-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .card-title { font-size: 14px; font-weight: 600; color: #f1f5f9; line-height: 1.3; }
  .card.done .card-title { text-decoration: line-through; opacity: 0.5; }

  .overdue-badge {
    font-size: 10px; font-weight: 700; color: #ef4444;
    background: rgba(239,68,68,0.12); padding: 2px 7px; border-radius: 4px; letter-spacing: 0.5px;
  }

  .card-meta { margin-top: 6px; }
  .type-badge {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 6px; border: 1px solid;
  }

  .card-note { margin-top: 8px; font-size: 12px; color: #64748b; line-height: 1.4; }

  .footer {
    position: fixed; bottom: 0; left: 0; right: 0; text-align: center;
    padding: 16px 20px; padding-bottom: max(16px, env(safe-area-inset-bottom, 16px));
    background: linear-gradient(0deg, #0f1117 60%, transparent);
    font-size: 11px; color: #475569;
  }

  .type-daily { background: rgba(245,158,11,0.13); color: #f59e0b; border-color: rgba(245,158,11,0.27); }
  .type-weekly { background: rgba(59,130,246,0.13); color: #3b82f6; border-color: rgba(59,130,246,0.27); }
  .type-monthly { background: rgba(139,92,246,0.13); color: #8b5cf6; border-color: rgba(139,92,246,0.27); }
  .type-one-off { background: rgba(239,68,68,0.13); color: #ef4444; border-color: rgba(239,68,68,0.27); }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <span class="header-icon">⚡</span>
    <div>
      <h1 class="title">Task Reminders</h1>
      <p class="date" id="dateDisplay"></p>
    </div>
  </div>
  <div class="progress-wrap">
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <span class="progress-text" id="progressText">0/0 today</span>
  </div>
</div>

<div class="filters" id="filters"></div>
<div class="task-list" id="taskList"></div>

<div class="footer">
  <p>Tell Claude in chat to add, edit, or remove tasks</p>
</div>

<script>
// ═══════════════════════════════════════════════════════
//  TASK DATA — Claude updates this section
// ═══════════════════════════════════════════════════════
const TASKS = [
  {
    id: 1,
    title: "Back up Unity project to external drive",
    type: "weekly",
    dayOfWeek: "Sunday",
    note: "Plastic SCM + manual backup",
  },
  {
    id: 2,
    title: "Run PC audit script (2nd pass)",
    type: "one-off",
    dueDate: "2026-03-28",
    note: "Check BIOS update + Gigabyte EC service",
  },
  {
    id: 3,
    title: "Gym session",
    type: "daily",
    note: "Or rest day if scheduled",
  },
  {
    id: 4,
    title: "Couch to 5K run",
    type: "weekly",
    dayOfWeek: "Monday",
    note: "Follow the programme schedule",
  },
  {
    id: 5,
    title: "Couch to 5K run",
    type: "weekly",
    dayOfWeek: "Thursday",
    note: "Follow the programme schedule",
  },
  {
    id: 6,
    title: "Review pub game progress & plan next sprint",
    type: "weekly",
    dayOfWeek: "Friday",
    note: "What got done, what's next",
  },
  {
    id: 7,
    title: "Clear NVMe free space check",
    type: "monthly",
    dayOfMonth: 1,
    note: "Keep SSD above 15% free",
  },
  {
    id: 8,
    title: "Water the plants",
    type: "weekly",
    dayOfWeek: "Wednesday",
    note: "Example task — tell Claude to remove",
  },
];
// ═══════════════════════════════════════════════════════
//  END TASK DATA
// ═══════════════════════════════════════════════════════

const DAYS = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
const TYPE_ICONS = { daily: "☀️", weekly: "📅", monthly: "🗓️", "one-off": "📌" };

function getToday() {
  const d = new Date();
  return { dateStr: d.toISOString().slice(0,10), dayName: DAYS[d.getDay()], dayOfMonth: d.getDate() };
}

function isDueToday(t) {
  const { dateStr, dayName, dayOfMonth } = getToday();
  if (t.type === "daily") return true;
  if (t.type === "one-off") return t.dueDate === dateStr;
  if (t.type === "weekly") return t.dayOfWeek === dayName;
  if (t.type === "monthly") return t.dayOfMonth === dayOfMonth;
  return false;
}

function isOverdue(t) {
  return t.type === "one-off" && t.dueDate < getToday().dateStr;
}

function nth(d) {
  if (d > 3 && d < 21) return "th";
  switch (d % 10) { case 1: return "st"; case 2: return "nd"; case 3: return "rd"; default: return "th"; }
}

function formatDue(t) {
  if (t.type === "daily") return "Every day";
  if (t.type === "weekly") return "Every " + t.dayOfWeek;
  if (t.type === "monthly") return t.dayOfMonth + nth(t.dayOfMonth) + " of each month";
  if (t.type === "one-off") {
    const d = new Date(t.dueDate + "T00:00:00");
    return d.toLocaleDateString("en-GB", { weekday: "short", day: "numeric", month: "short" });
  }
  return "";
}

// State
let completedIds = new Set();
let currentFilter = "today";

function loadState() {
  try {
    const raw = localStorage.getItem("task-state");
    if (raw) {
      const parsed = JSON.parse(raw);
      if (parsed.date === getToday().dateStr) {
        completedIds = new Set(parsed.completed);
      }
    }
  } catch {}
}

function saveState() {
  try {
    localStorage.setItem("task-state", JSON.stringify({
      date: getToday().dateStr,
      completed: [...completedIds]
    }));
  } catch {}
}

function toggleDone(id) {
  if (completedIds.has(id)) completedIds.delete(id);
  else completedIds.add(id);
  saveState();
  render();
}

function setFilter(f) {
  currentFilter = f;
  render();
}

function render() {
  // Date
  document.getElementById("dateDisplay").textContent =
    new Date().toLocaleDateString("en-GB", { weekday: "long", day: "numeric", month: "long" });

  // Filters
  const filterContainer = document.getElementById("filters");
  const filters = [
    { key: "today", label: "Today" },
    { key: "all", label: "All" },
    { key: "daily", label: "Daily" },
    { key: "weekly", label: "Weekly" },
    { key: "monthly", label: "Monthly" },
    { key: "one-off", label: "One-off" },
  ];
  filterContainer.innerHTML = filters.map(f =>
    `<button class="filter-btn ${currentFilter === f.key ? 'active' : ''}" onclick="setFilter('${f.key}')">${f.label}</button>`
  ).join("");

  // Filter tasks
  let tasks = TASKS.filter(t => {
    if (currentFilter === "today") return isDueToday(t) || isOverdue(t);
    if (currentFilter === "all") return true;
    return t.type === currentFilter;
  });

  // Sort: overdue first, then incomplete, then done
  tasks.sort((a, b) => {
    const aComp = completedIds.has(a.id) ? 1 : 0;
    const bComp = completedIds.has(b.id) ? 1 : 0;
    if (aComp !== bComp) return aComp - bComp;
    return (isOverdue(b) ? 1 : 0) - (isOverdue(a) ? 1 : 0);
  });

  // Progress
  const todayTasks = TASKS.filter(t => isDueToday(t) || isOverdue(t));
  const doneToday = todayTasks.filter(t => completedIds.has(t.id)).length;
  const pct = todayTasks.length ? (doneToday / todayTasks.length) * 100 : 0;
  document.getElementById("progressFill").style.width = pct + "%";
  document.getElementById("progressText").textContent = doneToday + "/" + todayTasks.length + " today";

  // Cards
  const list = document.getElementById("taskList");
  if (tasks.length === 0) {
    list.innerHTML = '<div class="empty"><span class="empty-icon">🎉</span><p class="empty-text">Nothing here — you\'re all clear!</p></div>';
    return;
  }

  list.innerHTML = tasks.map((t, i) => {
    const done = completedIds.has(t.id);
    const overdue = isOverdue(t);
    return `
      <div class="card ${done ? 'done' : ''} ${overdue ? 'overdue' : ''}"
           onclick="toggleDone(${t.id})" style="animation-delay: ${i * 0.04}s">
        <div class="checkbox">${done ? '✓' : ''}</div>
        <div class="card-body">
          <div class="card-title-row">
            <span class="card-title">${t.title}</span>
            ${overdue ? '<span class="overdue-badge">OVERDUE</span>' : ''}
          </div>
          <div class="card-meta">
            <span class="type-badge type-${t.type}">${TYPE_ICONS[t.type]} ${formatDue(t)}</span>
          </div>
          ${t.note ? `<p class="card-note">${t.note}</p>` : ''}
        </div>
      </div>
    `;
  }).join("");
}

// Init
loadState();
render();

// Register service worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
</body>
</html>
