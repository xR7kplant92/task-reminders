<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#09090b">
<title>Finance Calendar</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💷</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #09090b;
    --surface: #131318;
    --surface2: #1c1c24;
    --surface3: #25252f;
    --border: rgba(255,255,255,0.06);
    --text: #fafafa;
    --text2: #a1a1aa;
    --text3: #52525b;
    --income: #34d399;
    --income-bg: rgba(52,211,153,0.12);
    --bill: #f87171;
    --bill-bg: rgba(248,113,113,0.12);
    --savings: #fbbf24;
    --savings-bg: rgba(251,191,36,0.12);
    --accent: #818cf8;
    --accent-bg: rgba(129,140,248,0.12);
    --today: #818cf8;
    --radius: 14px;
  }

  body {
    font-family: 'DM Sans', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    min-height: 100dvh;
    -webkit-tap-highlight-color: transparent;
    overscroll-behavior: none;
    user-select: none;
  }

  /* ── Header ── */
  .header {
    padding: 16px 20px 12px;
    padding-top: max(16px, env(safe-area-inset-top, 16px));
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 10;
    background: var(--bg);
  }
  .header-title {
    font-size: 20px; font-weight: 800; letter-spacing: -0.3px;
  }
  .header-month {
    font-size: 13px; color: var(--text2); font-weight: 500; margin-top: 1px;
  }

  /* ── Month Nav ── */
  .month-nav {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 20px 16px;
  }
  .month-label {
    font-size: 18px; font-weight: 700; letter-spacing: -0.3px;
  }
  .month-year { color: var(--text2); font-weight: 500; }
  .nav-btns { display: flex; gap: 8px; }
  .nav-btn {
    width: 38px; height: 38px; border-radius: 10px;
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text); font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: all 0.15s;
    font-family: inherit;
  }
  .nav-btn:active { background: var(--surface2); transform: scale(0.95); }
  .today-btn {
    padding: 0 14px; width: auto; font-size: 12px; font-weight: 600;
    color: var(--accent);
  }

  /* ── Calendar Grid ── */
  .cal-wrap { padding: 0 16px; }
  .cal-grid {
    display: grid; grid-template-columns: repeat(7, 1fr);
    gap: 2px;
  }
  .day-header {
    text-align: center; font-size: 11px; font-weight: 600;
    color: var(--text3); padding: 6px 0 10px;
    font-family: 'DM Mono', monospace; text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .day-cell {
    aspect-ratio: 1;
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; border-radius: 12px;
    cursor: pointer; transition: all 0.15s;
    position: relative; gap: 3px;
  }
  .day-cell:active { transform: scale(0.93); }
  .day-cell.other-month { opacity: 0.2; }
  .day-cell.today {
    background: var(--accent-bg);
    box-shadow: inset 0 0 0 1.5px var(--accent);
  }
  .day-cell.selected {
    background: var(--surface2);
    box-shadow: inset 0 0 0 1.5px rgba(255,255,255,0.15);
  }
  .day-cell.today.selected {
    background: var(--accent-bg);
    box-shadow: inset 0 0 0 1.5px var(--accent);
  }
  .day-num {
    font-size: 14px; font-weight: 600;
    font-family: 'DM Mono', monospace;
    line-height: 1;
  }
  .day-cell.today .day-num { color: var(--accent); font-weight: 700; }
  .dot-row {
    display: flex; gap: 3px; height: 5px; align-items: center;
  }
  .dot {
    width: 5px; height: 5px; border-radius: 50%;
  }
  .dot.income { background: var(--income); }
  .dot.bill { background: var(--bill); }
  .dot.savings { background: var(--savings); }
  .dot.savings-urgent { background: var(--savings); animation: pulse 1.5s infinite; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* ── Detail Panel ── */
  .detail-panel {
    margin: 16px 16px 0;
    padding: 0;
    min-height: 160px;
    transition: all 0.2s ease;
  }
  .detail-date {
    font-family: 'DM Mono', monospace;
    font-size: 12px; font-weight: 500; color: var(--text3);
    padding: 0 4px 10px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 10px;
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .detail-empty {
    display: flex; align-items: center; justify-content: center;
    height: 100px; color: var(--text3); font-size: 14px; font-weight: 500;
  }

  .event-card {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 14px; border-radius: 12px;
    background: var(--surface); border: 1px solid var(--border);
    margin-bottom: 8px;
    animation: slideUp 0.25s ease both;
  }
  .event-card:nth-child(2) { animation-delay: 0.04s; }
  .event-card:nth-child(3) { animation-delay: 0.08s; }
  .event-card:nth-child(4) { animation-delay: 0.12s; }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .event-indicator {
    width: 4px; height: 36px; border-radius: 2px; flex-shrink: 0;
  }
  .event-indicator.income { background: var(--income); }
  .event-indicator.bill { background: var(--bill); }
  .event-indicator.savings, .event-indicator.savings-urgent { background: var(--savings); }

  .event-info { flex: 1; min-width: 0; }
  .event-title { font-size: 14px; font-weight: 600; }
  .event-detail {
    font-size: 12px; color: var(--text2); margin-top: 2px;
    font-family: 'DM Mono', monospace;
  }
  .event-amount {
    font-family: 'DM Mono', monospace;
    font-size: 14px; font-weight: 700; white-space: nowrap;
  }
  .event-amount.income { color: var(--income); }
  .event-amount.bill { color: var(--bill); }
  .event-amount.savings, .event-amount.savings-urgent { color: var(--savings); }

  /* ── Legend ── */
  .legend {
    display: flex; gap: 16px; justify-content: center;
    padding: 20px 0 32px;
    padding-bottom: max(32px, env(safe-area-inset-bottom, 32px));
  }
  .legend-item {
    display: flex; align-items: center; gap: 6px;
    font-size: 11px; color: var(--text3); font-weight: 500;
  }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; }

  /* ── Month summary bar ── */
  .month-summary {
    display: flex; gap: 8px; padding: 0 16px 12px;
  }
  .summary-pill {
    flex: 1; padding: 10px 12px; border-radius: 10px;
    background: var(--surface); border: 1px solid var(--border);
    text-align: center;
  }
  .pill-label { font-size: 10px; color: var(--text3); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
  .pill-value { font-family: 'DM Mono', monospace; font-size: 15px; font-weight: 700; margin-top: 3px; }
  .pill-value.income { color: var(--income); }
  .pill-value.bill { color: var(--bill); }
  .pill-value.net { color: var(--accent); }
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="header-title">💷 Finance</div>
  </div>
</div>

<div class="month-nav">
  <div>
    <span class="month-label" id="monthLabel"></span>
    <span class="month-year" id="yearLabel"></span>
  </div>
  <div class="nav-btns">
    <button class="nav-btn today-btn" onclick="goToday()">Today</button>
    <button class="nav-btn" onclick="prevMonth()">◀</button>
    <button class="nav-btn" onclick="nextMonth()">▶</button>
  </div>
</div>

<div class="month-summary" id="monthSummary"></div>

<div class="cal-wrap">
  <div class="cal-grid" id="calGrid"></div>
</div>

<div class="detail-panel" id="detailPanel"></div>

<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:var(--income)"></div> Income</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--bill)"></div> Bill</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--savings)"></div> Savings</div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
//  FINANCE DATA — Claude updates this section
// ═══════════════════════════════════════════════════════════════

const INCOME = [
  { name: "AW", type: "recurring-weeks", intervalWeeks: 4, anchorDate: "2026-03-27", amount: 1100 },
  { name: "PIP", type: "recurring-weeks", intervalWeeks: 4, anchorDate: "2026-04-09", amount: 550 },
  { name: "Night Work", type: "monthly-estimate", amount: 390, dayOfMonth: 15 },
  { name: "UC", type: "monthly-date", dayOfMonth: 13, adjustWeekend: true, amount: 1376 },
  { name: "Tebex", type: "monthly-estimate", amount: 550, dayOfMonth: 15 },
];

const OUTGOINGS = [
  { name: "Rent", amount: 480, dayOfMonth: 1, type: "monthly" },
  { name: "Gym", amount: 80, dayOfMonth: 1, type: "monthly" },
  { name: "HelloFresh", amount: 55, type: "weekly", dayOfWeek: 2 }, // 0=Sun, 2=Tue
];

const SAVINGS_GOALS = [
  { name: "Holiday", target: 1200, saved: 277, deadline: "2026-05-18", priority: "critical" },
];

const CURRENT_BALANCE = 8;

// ═══════════════════════════════════════════════════════════════
//  END FINANCE DATA
// ═══════════════════════════════════════════════════════════════

const MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];
const DAYS_SHORT = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];

function ds(d) { return d.getFullYear()+"-"+(d.getMonth()+1)+"-"+d.getDate(); }
function dsFull(d) {
  const days = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
  return days[d.getDay()] + " " + d.getDate() + " " + MONTHS[d.getMonth()];
}

function adjustWeekend(y, m, day) {
  let d = new Date(y, m, day);
  if (d.getDay() === 6) d.setDate(d.getDate() - 1);
  if (d.getDay() === 0) d.setDate(d.getDate() - 2);
  return d;
}

// Build events map for a given month range
function getEventsForRange(startDate, endDate) {
  const events = {};
  function add(d, evt) {
    const key = ds(d);
    if (!events[key]) events[key] = [];
    events[key].push(evt);
  }

  const startMs = startDate.getTime();
  const endMs = endDate.getTime();

  // Recurring-weeks income (AW, PIP)
  INCOME.filter(i => i.type === "recurring-weeks").forEach(inc => {
    let d = new Date(inc.anchorDate + "T00:00:00");
    // go back far enough
    while (d.getTime() > startMs) d.setDate(d.getDate() - inc.intervalWeeks * 7);
    // go forward through range
    while (d.getTime() <= endMs) {
      if (d.getTime() >= startMs) {
        add(new Date(d), { type: "income", name: inc.name, amount: inc.amount, detail: "Every " + inc.intervalWeeks + " weeks" });
      }
      d.setDate(d.getDate() + inc.intervalWeeks * 7);
    }
  });

  // Monthly-date income (UC)
  INCOME.filter(i => i.type === "monthly-date").forEach(inc => {
    for (let m = startDate.getMonth() - 1; m <= endDate.getMonth() + 13; m++) {
      const yr = startDate.getFullYear() + Math.floor(m / 12);
      const mo = ((m % 12) + 12) % 12;
      const maxDay = new Date(yr, mo + 1, 0).getDate();
      let d = new Date(yr, mo, Math.min(inc.dayOfMonth, maxDay));
      if (inc.adjustWeekend) d = adjustWeekend(yr, mo, Math.min(inc.dayOfMonth, maxDay));
      if (d.getTime() >= startMs && d.getTime() <= endMs) {
        add(d, { type: "income", name: inc.name, amount: inc.amount, detail: inc.dayOfMonth + "th monthly" });
      }
    }
  });

  // Monthly-estimate income
  INCOME.filter(i => i.type === "monthly-estimate").forEach(inc => {
    for (let m = startDate.getMonth() - 1; m <= endDate.getMonth() + 13; m++) {
      const yr = startDate.getFullYear() + Math.floor(m / 12);
      const mo = ((m % 12) + 12) % 12;
      const d = new Date(yr, mo, inc.dayOfMonth || 15);
      if (d.getTime() >= startMs && d.getTime() <= endMs) {
        add(d, { type: "income", name: inc.name + " (est.)", amount: inc.amount, detail: "Monthly estimate" });
      }
    }
  });

  // Monthly outgoings
  OUTGOINGS.filter(o => o.type === "monthly").forEach(out => {
    for (let m = startDate.getMonth() - 1; m <= endDate.getMonth() + 13; m++) {
      const yr = startDate.getFullYear() + Math.floor(m / 12);
      const mo = ((m % 12) + 12) % 12;
      const maxDay = new Date(yr, mo + 1, 0).getDate();
      const d = new Date(yr, mo, Math.min(out.dayOfMonth, maxDay));
      if (d.getTime() >= startMs && d.getTime() <= endMs) {
        add(d, { type: "bill", name: out.name, amount: out.amount, detail: out.dayOfMonth + "st monthly" });
      }
    }
  });

  // Weekly outgoings
  OUTGOINGS.filter(o => o.type === "weekly").forEach(out => {
    let d = new Date(startDate);
    // find first occurrence
    while (d.getDay() !== out.dayOfWeek) d.setDate(d.getDate() + 1);
    while (d.getTime() <= endMs) {
      if (d.getTime() >= startMs) {
        add(new Date(d), { type: "bill", name: out.name, amount: out.amount, detail: "Weekly" });
      }
      d.setDate(d.getDate() + 7);
    }
  });

  // Savings goal deadlines and milestones
  SAVINGS_GOALS.forEach(g => {
    const deadline = new Date(g.deadline + "T00:00:00");
    if (deadline.getTime() >= startMs && deadline.getTime() <= endMs) {
      add(deadline, {
        type: "savings-urgent",
        name: "🔥 " + g.name + " deadline",
        amount: g.target,
        detail: "£" + g.saved + " saved of £" + g.target
      });
    }
    // Weekly Monday check-ins
    let d = new Date(startDate);
    while (d.getDay() !== 1) d.setDate(d.getDate() + 1);
    const now = new Date();
    while (d.getTime() <= endMs && d.getTime() <= deadline.getTime()) {
      if (d.getTime() >= startMs) {
        const daysLeft = Math.ceil((deadline - d) / 86400000);
        const weeksLeft = Math.max(Math.floor(daysLeft / 7), 1);
        const remaining = g.target - g.saved;
        const perWeek = Math.round(remaining / weeksLeft);
        add(new Date(d), {
          type: daysLeft <= 14 ? "savings-urgent" : "savings",
          name: g.name + " check-in",
          amount: perWeek,
          detail: daysLeft + "d left · £" + perWeek + "/wk needed"
        });
      }
      d.setDate(d.getDate() + 7);
    }
  });

  return events;
}

// State
let viewYear, viewMonth, selectedDate;
const today = new Date();
today.setHours(0,0,0,0);

function goToday() {
  viewYear = today.getFullYear();
  viewMonth = today.getMonth();
  selectedDate = ds(today);
  render();
}

function prevMonth() {
  viewMonth--;
  if (viewMonth < 0) { viewMonth = 11; viewYear--; }
  selectedDate = null;
  render();
}

function nextMonth() {
  viewMonth++;
  if (viewMonth > 11) { viewMonth = 0; viewYear++; }
  selectedDate = null;
  render();
}

function selectDay(key) {
  selectedDate = key;
  render();
}

function render() {
  // Month label
  document.getElementById("monthLabel").textContent = MONTHS[viewMonth];
  document.getElementById("yearLabel").textContent = viewYear;

  // Calculate date range for events (prev month to next month for overflow)
  const rangeStart = new Date(viewYear, viewMonth - 1, 1);
  const rangeEnd = new Date(viewYear, viewMonth + 2, 0);
  const events = getEventsForRange(rangeStart, rangeEnd);

  // Calendar grid
  const firstDay = new Date(viewYear, viewMonth, 1);
  const lastDay = new Date(viewYear, viewMonth + 1, 0);
  // Monday = 0
  let startOffset = (firstDay.getDay() + 6) % 7;
  const totalDays = lastDay.getDate();

  let html = DAYS_SHORT.map(d => `<div class="day-header">${d}</div>`).join("");

  // Previous month overflow
  const prevLastDay = new Date(viewYear, viewMonth, 0).getDate();
  for (let i = startOffset - 1; i >= 0; i--) {
    const dayNum = prevLastDay - i;
    const d = new Date(viewYear, viewMonth - 1, dayNum);
    const key = ds(d);
    const dayEvents = events[key] || [];
    html += renderDayCell(dayNum, key, dayEvents, true, false);
  }

  // Current month
  for (let d = 1; d <= totalDays; d++) {
    const date = new Date(viewYear, viewMonth, d);
    const key = ds(date);
    const isToday = key === ds(today);
    const dayEvents = events[key] || [];
    html += renderDayCell(d, key, dayEvents, false, isToday);
  }

  // Next month overflow
  const cellsUsed = startOffset + totalDays;
  const remaining = (7 - (cellsUsed % 7)) % 7;
  for (let d = 1; d <= remaining; d++) {
    const date = new Date(viewYear, viewMonth + 1, d);
    const key = ds(date);
    const dayEvents = events[key] || [];
    html += renderDayCell(d, key, dayEvents, true, false);
  }

  document.getElementById("calGrid").innerHTML = html;

  // Month summary
  let monthIn = 0, monthOut = 0;
  for (let d = 1; d <= totalDays; d++) {
    const date = new Date(viewYear, viewMonth, d);
    const key = ds(date);
    const dayEvents = events[key] || [];
    dayEvents.forEach(e => {
      if (e.type === "income") monthIn += e.amount;
      if (e.type === "bill") monthOut += e.amount;
    });
  }
  document.getElementById("monthSummary").innerHTML = `
    <div class="summary-pill">
      <div class="pill-label">In</div>
      <div class="pill-value income">£${Math.round(monthIn).toLocaleString()}</div>
    </div>
    <div class="summary-pill">
      <div class="pill-label">Out</div>
      <div class="pill-value bill">£${Math.round(monthOut).toLocaleString()}</div>
    </div>
    <div class="summary-pill">
      <div class="pill-label">Net</div>
      <div class="pill-value net">£${Math.round(monthIn - monthOut).toLocaleString()}</div>
    </div>
  `;

  // Detail panel
  renderDetail(events);
}

function renderDayCell(num, key, evts, otherMonth, isToday) {
  const isSelected = key === selectedDate;
  const classes = [
    "day-cell",
    otherMonth ? "other-month" : "",
    isToday ? "today" : "",
    isSelected ? "selected" : "",
  ].filter(Boolean).join(" ");

  // Collect unique event types for dots
  const types = [...new Set(evts.map(e => e.type))];

  return `
    <div class="${classes}" onclick="selectDay('${key}')">
      <span class="day-num">${num}</span>
      <div class="dot-row">
        ${types.map(t => `<div class="dot ${t}"></div>`).join("")}
      </div>
    </div>
  `;
}

function renderDetail(events) {
  const panel = document.getElementById("detailPanel");

  if (!selectedDate) {
    panel.innerHTML = `<div class="detail-empty">Tap a day to see what's due</div>`;
    return;
  }

  // Parse selected date
  const parts = selectedDate.split("-");
  const selDate = new Date(+parts[0], +parts[1] - 1, +parts[2]);
  const dayEvents = events[selectedDate] || [];

  let html = `<div class="detail-date">${dsFull(selDate)}</div>`;

  if (dayEvents.length === 0) {
    html += `<div class="detail-empty">Nothing scheduled</div>`;
  } else {
    dayEvents.forEach(e => {
      const prefix = e.type === "income" ? "+" : e.type === "bill" ? "-" : "";
      html += `
        <div class="event-card">
          <div class="event-indicator ${e.type}"></div>
          <div class="event-info">
            <div class="event-title">${e.name}</div>
            <div class="event-detail">${e.detail}</div>
          </div>
          <div class="event-amount ${e.type}">${prefix}£${e.amount.toLocaleString()}</div>
        </div>
      `;
    });
  }

  panel.innerHTML = html;
}

// Init
goToday();

// Service worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
</body>
</html>
